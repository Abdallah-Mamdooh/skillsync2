name: skillsync_app
description: SkillSync - Closer Than You Think
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  http: ^1.1.0
  provider: ^6.0.0
  google_sign_in: ^6.1.5
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  flutter_svg: ^2.0.7
  flutter_lucide: ^1.1.2
  lucide_icons_flutter: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
